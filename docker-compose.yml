version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: adk-mailing-db
    environment:
      POSTGRES_USER: marketing_user
      POSTGRES_PASSWORD: marketing_pass
      POSTGRES_DB: marketing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketing_user -d marketing_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
